<!DOCTYPE html>
<html>
<head>
  <title>EduShine Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#e0f2fe,#fef3c7);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .box {
      background:white;
      padding:40px;
      width:320px;
      border-radius:10px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
      text-align:center;
    }
    input {
      width:100%;
      padding:10px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:5px;
    }
    button {
      width:100%;
      padding:10px;
      background:#2563eb;
      color:white;
      border:none;
      border-radius:5px;
      font-weight:bold;
      cursor:pointer;
    }
    #status { margin-top:10px; color:red; }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="status"></p>
</div>

<script type="module" src="auth.js"></script>
</body>
</html>
